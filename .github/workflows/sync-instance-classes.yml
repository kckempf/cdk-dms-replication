# Queries the DMS API weekly and opens a PR if new replication instance
# classes have been added or removed since the last sync.
#
# One-time setup required:
#
#   1. Create an IAM role in your AWS account with this trust policy
#      (replace ORG/REPO with your GitHub org and repo name):
#
#        {
#          "Version": "2012-10-17",
#          "Statement": [{
#            "Effect": "Allow",
#            "Principal": { "Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com" },
#            "Action": "sts:AssumeRoleWithWebIdentity",
#            "Condition": {
#              "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
#              "StringLike":   { "token.actions.githubusercontent.com:sub": "repo:ORG/REPO:*" }
#            }
#          }]
#        }
#
#   2. Attach this inline policy to the role:
#
#        {
#          "Version": "2012-10-17",
#          "Statement": [{
#            "Effect": "Allow",
#            "Action": "dms:DescribeOrderableReplicationInstances",
#            "Resource": "*"
#          }]
#        }
#
#   3. Add the role ARN as a GitHub Actions variable:
#      Settings → Secrets and variables → Actions → Variables → New variable
#      Name:  AWS_SYNC_ROLE_ARN
#      Value: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME

name: sync-instance-classes
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch: {}   # Allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC token exchange

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PROJEN_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_SYNC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync instance classes
        run: node scripts/sync-instance-classes.js

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/enums.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and test
        if: steps.diff.outputs.changed == 'true'
        run: npx projen build

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJEN_GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-instance-classes-$(date +%Y%m%d)"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git restore --staged --worktree .github/
          git add src/enums.ts
          git commit -m "chore: sync ReplicationInstanceClass enum with DMS API"
          git push --force-with-lease origin "$BRANCH"

          # Skip if a sync PR is already open for today
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists for branch $BRANCH, skipping."
            exit 0
          fi

          gh pr create \
            --title "chore: sync ReplicationInstanceClass enum with DMS API" \
            --body "$(cat <<'EOF'
          Automatically generated by the weekly \`sync-instance-classes\` workflow.

          Updated the \`ReplicationInstanceClass\` enum in \`src/enums.ts\` to match
          the current output of \`describe-orderable-replication-instances\` (us-east-1).

          **Review checklist:**
          - [ ] Added/removed classes in the diff look correct
          - [ ] Default \`R6I_LARGE\` is still a current-generation instance
          - [ ] Build and tests pass (verified by this workflow before opening the PR)
          EOF
          )" \
            --head "$BRANCH" \
            --base main
